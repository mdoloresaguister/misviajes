<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Viajes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> 

    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    
</head>
<body>

      <header class="header-carrusel">
    <div class="carrusel-slides">
        <div class="slide activa" style="background-image: url('imagenes/encabezado1.png');"></div>
        <div class="slide" style="background-image: url('imagenes/encabezado2.png');"></div>
        <div class="slide" style="background-image: url('imagenes/encabezado3.png');"></div>
        <div class="slide" style="background-image: url('imagenes/encabezado4.png');"></div>
    </div>

    <div class="contenido-header">
        <h1>Mis Viajes</h1>
        <p style="margin: 5px 0 15px 0; font-size: 1.1rem; opacity: 0.9;">Recuerdos y Aventuras</p>

   <div class="barra-filtros" style="display: flex; justify-content: space-between; align-items: flex-end; width: 100%; gap: 20px; flex-wrap: wrap;">
            
            <div class="filtro-izquierdo" style="display: flex; flex-direction: column; gap: 12px; align-items: flex-start;">
                
                <div style="display: flex; align-items: center; justify-content: flex-start; width: 100%;">
                    <label for="filtro-ano" style="min-width: 140px; text-align: left; display: inline-block;">Filtrar por año: </label>
                    <select id="filtro-ano" onchange="filtrarViajes()">
                        <option value="todos">Todos los años</option>
                    </select>
                </div>
                
                <div style="display: flex; align-items: center; justify-content: flex-start; width: 100%;">
                    <label for="buscador-texto" style="min-width: 140px; text-align: left; display: inline-block;">Filtrar por destino: </label>
                    <input type="text" id="buscador-texto" oninput="filtrarViajes()" placeholder="Escribe un destino..." style="padding: 5px 10px; border-radius: 8px; border: 1px solid #ffffff; background-color: rgba(255, 255, 255, 0.9); color: #2d4a43; font-weight: bold; outline: none; width: 180px;">
                </div>
                
                <div style="margin-top: 5px;">
                    <button onclick="abrirModalMapa()" style="background: none; border: none; color: #ffffff; font-size: 0.9rem; font-weight: bold; text-decoration: underline; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; padding: 0;">
                        🗺️ POR EL MUNDO...
                    </button>
                </div>

            </div>

            <div class="contador-viajes" style="margin-bottom: 5px; flex-shrink: 0;">
                Total experiencias: <span id="numero-viajes">0</span>
            </div>

        </div>
    </div>
</header>
    <main>
        <!-- Aquí es donde JavaScript meterá las tarjetas automáticamente -->
        <div id="contenedor-viajes" class="grid-viajes"></div>
    </main>


    <div id="ventana-modal" class="modal" onclick="cerrarImagen()">
        <span class="cerrar">&times;</span>
        <img class="contenido-modal" id="imagen-maximizada">
    </div>
    <div id="modal-mapa" style="position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100vh; background-color: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center;">
        <div style="position: relative; background-color: #fbfbfb; width: 92%; height: 85%; max-width: 1400px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.4); overflow: hidden; display: flex; flex-direction: column;">
            
            <div style="padding: 15px 20px; background-color: #2d4a43; color: white; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;">
                <h2 style="margin: 0; font-size: 1.2rem; font-family: Arial, sans-serif;">🗺️ Mapa de Experiencias</h2>
                <button onclick="cerrarModalMapa()" style="background: none; border: none; color: white; font-size: 1.6rem; cursor: pointer; font-weight: bold; line-height: 1; padding: 0 5px;">&times;</button>
            </div>
            
            <div id="mapa-modal-container" style="flex-grow: 1; width: 100%; height: 100%;"></div>
        </div>
    </div>
    <script src="script.js"></script>
    <button id="btn-subir" class="btn-scroll-top" title="Volver arriba">▲</button>
</body>
</html>
